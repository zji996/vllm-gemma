# ============================================================
# vLLM Multi-Model Launcher — Gemma 4
# ============================================================
# Usage:
#   ./vllm.sh list              — 列出所有可用模型
#   ./vllm.sh start <model>     — 启动指定模型
#   ./vllm.sh stop              — 停止当前运行的模型
#   ./vllm.sh status            — 查看当前运行状态
#   ./vllm.sh logs              — 查看日志
#
# Or directly with docker compose:
#   docker compose --profile gemma26b up -d
# ============================================================

# ---- Shared config anchors ----

# Environment: ModelScope source (default for most models)
x-env-modelscope: &env-modelscope
  NVIDIA_VISIBLE_DEVICES: all
  MODELSCOPE_CACHE: /root/.cache/modelscope
  TRITON_CACHE_DIR: /root/.triton/cache
  VLLM_USE_MODELSCOPE: "True"

# Environment: HuggingFace source (for HF-only models)
x-env-huggingface: &env-huggingface
  NVIDIA_VISIBLE_DEVICES: all
  HF_HOME: /root/.cache/huggingface
  TRITON_CACHE_DIR: /root/.triton/cache

x-vllm-serve-common: &vllm-serve-common
  VLLM_SERVED_MODEL_NAME: gemma
  VLLM_API_KEY: ${API_KEY:-abc123}
  VLLM_ENABLE_PREFIX_CACHING: "true"
  # Gemma 4 tool calling
  SERVE_ENABLE_AUTO_TOOL_CHOICE: "true"
  SERVE_TOOL_CALL_PARSER: gemma4
  # Thinking mode: 默认关闭, 设 true 启用
  SERVE_ENABLE_THINKING: ${ENABLE_THINKING:-false}
  SERVE_REASONING_PARSER: gemma4
  # 性能优化
  SERVE_ASYNC_SCHEDULING: "true"

x-vllm-serve-mm-common: &vllm-serve-mm-common
  SERVE_MM_PROCESSOR_CACHE_TYPE: shm
  # Vision token budget: 280(默认), 可选 70/140/280/560/1120
  SERVE_MM_PROCESSOR_KWARGS: '{"max_soft_tokens": ${VISION_TOKEN_BUDGET:-280}}'

x-vllm-serve-256k: &vllm-serve-256k
  VLLM_MAX_MODEL_LEN: ${MAX_MODEL_LEN:-262144}
  VLLM_MAX_NUM_SEQS: ${MAX_NUM_SEQS:-1000}

x-vllm-serve-128k: &vllm-serve-128k
  VLLM_MAX_MODEL_LEN: ${MAX_MODEL_LEN:-131072}
  VLLM_MAX_NUM_SEQS: ${MAX_NUM_SEQS:-256}

x-vllm-mm-limit-1000: &vllm-mm-limit-1000
  VLLM_LIMIT_MM_PER_PROMPT: '{"image":1000}'

x-vllm-mm-limit-100: &vllm-mm-limit-100
  VLLM_LIMIT_MM_PER_PROMPT: '{"image":100}'

# Gemma 26B A4B: MoE 26B总参/4B激活, 256K上下文, 多模态
x-vllm-gemma26b-mm-tp2: &vllm-gemma26b-mm-tp2
  <<: [*vllm-serve-common, *vllm-serve-mm-common, *vllm-serve-256k, *vllm-mm-limit-1000]
  VLLM_TENSOR_PARALLEL_SIZE: "2"

x-vllm-gemma26b-mm-tp1: &vllm-gemma26b-mm-tp1
  <<: [*vllm-serve-common, *vllm-serve-mm-common, *vllm-serve-256k, *vllm-mm-limit-100]
  VLLM_TENSOR_PARALLEL_SIZE: "1"

x-common-volumes: &common-volumes
  - ./.cache/modelscope:/root/.cache/modelscope
  - ./.cache/vllm:/root/.cache/vllm
  - ./.cache/triton:/root/.triton/cache
  - ./.cache/huggingface:/root/.cache/huggingface

# Deploy: dual GPU (e.g. 2× RTX 3080 20GB)
x-deploy-dual-gpu: &deploy-dual-gpu
  resources:
    reservations:
      devices:
        - driver: nvidia
          device_ids: ['0', '1']
          capabilities: [gpu, compute, utility]
    limits:
      memory: 50g

# Deploy: single GPU
# GPU 可通过 VLLM_GPU_ID 环境变量动态选择 (./vllm.sh start <profile> --gpu 1)
x-deploy-single-gpu: &deploy-single-gpu
  resources:
    reservations:
      devices:
        - driver: nvidia
          device_ids: ['${VLLM_GPU_ID:-0}']
          capabilities: [gpu, compute, utility]
    limits:
      memory: 40g

# Deploy: single GPU (e.g. 1× RTX 3080 20GB)
x-deploy-single-3080: &deploy-single-3080
  resources:
    reservations:
      devices:
        - driver: nvidia
          device_ids: ['${VLLM_GPU_ID:-0}']
          capabilities: [gpu, compute, utility]
    limits:
      memory: 30g

# ---- Build config ----
x-build-config-stable: &build-config-stable
  context: .
  dockerfile: Dockerfile.stable
  target: runtime-base
  args:
    BASE_IMAGE: ${STABLE_BASE_IMAGE:-vllm/vllm-openai:v0.19.0}
    INSTALL_TRANSFORMERS_FROM_SOURCE: ${INSTALL_TRANSFORMERS_FROM_SOURCE:-false}
    INSTALL_TRANSFORMERS_FROM_PYPI: ${INSTALL_TRANSFORMERS_FROM_PYPI:-false}
    TRANSFORMERS_VERSION: ${TRANSFORMERS_VERSION:-}
    SKIP_SYSTEM_BOOTSTRAP: ${SKIP_SYSTEM_BOOTSTRAP:-false}

x-build-config: &build-config
  <<: *build-config-stable

# Base: dual GPU + ModelScope (current server: 2× RTX 3080 20GB)
x-base-dual-ms: &base-dual-ms
  build: *build-config
  image: local/vllm-openai:latest
  entrypoint: ["/opt/vllm-tools/scripts/vllm/serve-model.sh"]
  runtime: nvidia
  environment: *env-modelscope
  volumes: *common-volumes
  ports:
    - "8000:8000"
  ipc: host
  deploy: *deploy-dual-gpu
  restart: unless-stopped

# Base: single GPU + ModelScope
x-base-single-ms: &base-single-ms
  build: *build-config
  image: local/vllm-openai:latest
  entrypoint: ["/opt/vllm-tools/scripts/vllm/serve-model.sh"]
  runtime: nvidia
  environment: *env-modelscope
  volumes: *common-volumes
  ports:
    - "${VLLM_HOST_PORT:-8000}:8000"
  ipc: host
  deploy: *deploy-single-3080
  restart: unless-stopped

# Base: single GPU + HuggingFace
x-base-single-hf: &base-single-hf
  build: *build-config
  image: local/vllm-openai:latest
  entrypoint: ["/opt/vllm-tools/scripts/vllm/serve-model.sh"]
  runtime: nvidia
  environment: *env-huggingface
  volumes: *common-volumes
  ports:
    - "${VLLM_HOST_PORT:-8000}:8000"
  ipc: host
  deploy: *deploy-single-gpu
  restart: unless-stopped

# ============================================================
# Model Services — 同一时间只能运行一个 (共享端口 8000)
#
# Gemma 4 Model Family:
#   A) 26B-A4B MoE: 26B总参/4B激活, 256K上下文, 多模态 (Text+Image)
# ============================================================

services:
  # --------------------------------------------------------
  # Gemma-4-26B-A4B-it — MoE 多模态主力
  # 26B 总参数, 4B 激活参数, 128 experts (8 active + 1 shared)
  # 支持 Text + Image 多模态输入
  # 硬件: 2× RTX 3080 20GB | 模型源: ModelScope
  # --------------------------------------------------------
  gemma26b:
    <<: *base-dual-ms
    container_name: vllm-gemma26b
    profiles: ["gemma26b"]
    environment:
      <<: [*env-modelscope, *vllm-gemma26b-mm-tp2]
      VLLM_MODEL: google/gemma-4-26B-A4B-it
      VLLM_GPU_MEMORY_UTILIZATION: ${GPU_MEMORY_UTILIZATION:-0.95}
      # 26B 不支持 audio, 仅 image
      VLLM_LIMIT_MM_PER_PROMPT: '${LIMIT_MM:-image=1000}'
